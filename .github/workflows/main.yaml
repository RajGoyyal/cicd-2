name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker
        run: docker build -t myapp .

      - name: Test Container
        run: docker run myapp

      - name: Run Container
        run: docker run myapp

